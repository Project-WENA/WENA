backend:
  name: git-gateway
  branch: main
media_folder: "content/blog/images"
public_folder: "/content/blog/images"
collections:
  - name: "blog"
    label: "Blog Articles"
    folder: "content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Publish Date", name: "date", widget: "datetime"}
      - {label: "Cover Image", name: "image", widget: "image", required: false}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Body", name: "body", widget: "markdown"}

  - name: "continue_learning"
    label: "Continue Learning Videos"
    files:
      - label: "Continue Learning Videos"
        name: "continue_learning"
        file: "content/continue-learning.json"
        fields:
          - label: "Left Video"
            name: "left"
            widget: "object"
            fields:
              - {label: "YouTube Link", name: "youtube_url", widget: "string", required: false, hint: "Paste the full YouTube link, e.g. https://www.youtube.com/watch?v=xxxxxxxxxxx"}
          - label: "Right Video"
            name: "right"
            widget: "object"
            fields:
              - {label: "YouTube Link", name: "youtube_url", widget: "string", required: false, hint: "Paste the full YouTube link, e.g. https://www.youtube.com/watch?v=xxxxxxxxxxx"}
